<header class="topbar">
  <div class="topbar-actions">
    <button *ngIf="showELearning" class="primary-btn small" (click)="goToELearning()">
      <span class="material-symbols-outlined">school</span>
      E-learning
    </button>
    <div class="notif-wrapper">
      <button class="icon-btn notif-btn" (click)="toggleNotifDropdown()">
        <span class="material-symbols-outlined">notifications</span>
        <span *ngIf="activeAlerts.length > 0" class="notif-badge">{{ activeAlerts.length }}</span>
      </button>
      <div *ngIf="showNotifDropdown" class="notif-dropdown">
        <div class="notif-header">
          <span class="notif-title">Notifications</span>
          <button class="notif-link" (click)="goToAlerts()">Voir tout</button>
        </div>
        <div class="notif-list">
          <div *ngFor="let alert of activeAlerts" class="notif-item" [ngClass]="'notif-' + alert.severity" (click)="goToAlerts()">
            <span class="material-symbols-outlined notif-icon">{{ getSeverityIcon(alert.severity) }}</span>
            <div class="notif-content">
              <div class="notif-item-title">{{ alert.title }}</div>
              <div class="notif-time">{{ formatTimeAgo(alert.createdAt) }}</div>
            </div>
          </div>
          <div *ngIf="activeAlerts.length === 0" class="notif-empty">
            <span class="material-symbols-outlined">notifications_off</span>
            Aucune notification
          </div>
        </div>
      </div>
    </div>
    <button class="icon-btn" (click)="openLogoutModal()" title="Se déconnecter">
      <span class="material-symbols-outlined">logout</span>
    </button>
    <button class="profile" type="button" (click)="openProfile()" title="Mon profil">
      <div>
        <div class="profile-name">{{ profileName }}</div>
        <div class="profile-org">{{ orgLabel }}</div>
      </div>
      <div class="avatar" *ngIf="!profilePictureUrl">{{ profileInitials }}</div>
      <img class="avatar-image" *ngIf="profilePictureUrl" [src]="profilePictureUrl" alt="Avatar" />
    </button>
  </div>
</header>

<!-- Logout Confirmation Modal -->
<div class="logout-overlay" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
  <div class="logout-modal" (click)="$event.stopPropagation()">
    <div class="logout-modal-icon">
      <span class="material-symbols-outlined">logout</span>
    </div>
    <h3>Are you sure you want to logout?</h3>
    <p>You will be redirected to the login page.</p>
    <div class="logout-modal-actions">
      <button class="modal-btn cancel" (click)="closeLogoutModal()">No</button>
      <button class="modal-btn confirm" (click)="confirmLogout()">Yes</button>
    </div>
  </div>
</div>
